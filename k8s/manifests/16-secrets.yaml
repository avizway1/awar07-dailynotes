#Use StringData for automatical encoding conversion by k8s
apiVersion: v1
kind: Secret
metadata:
    name: db-secret
type: Opaque
stringData:
  DB_USER: admin
  DB_PASSWORD: password123

# ---
# apiVersion: v1
# kind: Secret
# Metadata:
#     name: db-secret
# type: Opaque
# data:
#   DB_USER: YWRtaW4=
#   DB_PASSWORD: cGFzc3dvcmQxMjM=

---
apiVersion: v1
kind: Pod
metadata:
  name: db-pod
spec:
  containers:
    - name: app
      image: busybox
      command: ["sh", "-c", "echo $DB_USER && sleep 3600"]
      envFrom:
        - secretRef:
            name: db-secret